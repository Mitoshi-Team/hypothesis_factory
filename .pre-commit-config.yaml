repos:
  - repo: local
    hooks:
      - id: ruff-check
        entry: ruff check
        name: ruff check
        args: [--exit-non-zero-on-fix]
        language: system
        pass_filenames: false
        types: [python]
      - id: ruff-format
        entry: ruff format --check
        name: ruff format --check
        language: system
        pass_filenames: false
        types: [python]
      - id: mdformat
        name: mdformat
        entry: mdformat --check --number
        language: system
        types: [markdown]
        exclude: ^(README\.md|services/ml_worker/README\.md|docs/REQUIREMENTS\.md|docs/API_CONTRACT\.md)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
