services:
  postgres:
      image: postgres:17-alpine
      container_name: postgres
      environment:
          POSTGRES_USER: ${POSTGRES_USER:-hypothesis-factory}
          POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypothesis-factory}
          POSTGRES_DB: ${POSTGRES_DB:-hypothesis-factory}
      volumes:
          - postgres_data:/var/lib/postgresql/data
      healthcheck:
          test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hypothesis-factory}"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 10s

  redis:
    image: redis:8.6.2
    container_name: redis
    command:
        - redis-server
    restart: unless-stopped
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 3

volumes:
    postgres_data:
        driver: local