services:
  postgres:
    image: postgres:17-alpine
    container_name: hypothesis_factory_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hypothesis-factory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypothesis-factory}
      POSTGRES_DB: ${POSTGRES_DB:-hypothesis-factory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - hypothesis_factory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hypothesis-factory}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.6.2
    container_name: hypothesis_factory_redis
    command:
      - redis-server
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - hypothesis_factory
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  chroma:
    image: chromadb/chroma:1.5.9
    container_name: hypothesis_factory_chroma
    volumes:
      - chroma_data:/chroma/chroma
    expose:
      - "8000"
    networks:
      - hypothesis_factory
    environment:
      - CHROMA_DB_IMPL=duckdb+parquet
      - CHROMA_PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: >
        bash -c 'exec 3<>/dev/tcp/localhost/8000;
        echo -e "GET /api/v2/heartbeat HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n" >&3;
        head -1 <&3 | grep -q "200 OK"'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ml_worker:
    build:
      context: .
      dockerfile: services/ml_worker/Dockerfile
    container_name: hypothesis_factory_ml_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    networks:
      - hypothesis_factory
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://hypothesis-factory:hypothesis-factory@postgres:5432/hypothesis-factory}
      - CHROMA_HOST=${CHROMA_HOST:-chroma}
      - CHROMA_PORT=${CHROMA_PORT:-8000}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEX_EMBED_MODEL=${YANDEX_EMBED_MODEL:-text-embeddings/latest}
      - YANDEX_LLM_MODEL=${YANDEX_LLM_MODEL:-qwen3-235b-a22b-fp8/latest}
      - YANDEX_LLM_TEMPERATURE=${YANDEX_LLM_TEMPERATURE:-0.7}
      - YANDEX_LLM_MAX_TOKENS=${YANDEX_LLM_MAX_TOKENS:-4096}
      - REPORT_DIR=${REPORT_DIR:-/app/reports}
      - NER_MODEL_NAME=${NER_MODEL_NAME:-urchade/gliner_multi-v2.1}
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    command: ["/app/.venv/bin/celery", "-A", "src.celery_app", "worker", "-l", "info", "-c", "1"]

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: hypothesis_factory_api_gateway
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml_worker:
        condition: service_started
    networks:
      - hypothesis_factory
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hypothesis-factory:hypothesis-factory@postgres:5432/hypothesis-factory}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/uploads}
      - REPORT_DIR=${REPORT_DIR:-/app/reports}
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    command: ["/app/.venv/bin/uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    container_name: hypothesis_factory_frontend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      api_gateway:
        condition: service_started
    networks:
      - hypothesis_factory

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  uploads:
    driver: local
  reports:
    driver: local

networks:
  hypothesis_factory:
    driver: bridge
